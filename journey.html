<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Little Journey ❤️</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body{
            overflow:hidden;
        }
        .journey{
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:25px;
            position:relative;
        }
        h1{
            color:#d65a8a;
            font-size:34px;
            margin-bottom:20px;
            animation:fadeIn 2s ease;
        }
        p{
            color:#555;
            font-size:22px;
            line-height:1.8;
            animation:fadeIn 3s ease;
        }
        .walk{
            position:relative;
            width:100%;
            height:140px;
            margin:40px 0;
        }
        .foot{
            position:absolute;
            font-size:42px;
            animation:walkAcross 8s linear infinite;
        }
        .foot:nth-child(2){
            animation-delay:1s;
        }
        .foot:nth-child(3){
            animation-delay:2s;
        }
        .foot:nth-child(4){
            animation-delay:3s;
        }
        .heart{
            position:absolute;
            bottom:-40px;
            font-size:24px;
            animation:floatHeart 7s linear infinite;
            opacity:.8;
        }
        .heart:nth-child(5){ left:15%; animation-delay:0s;}
        .heart:nth-child(6){ left:35%; animation-delay:2s;}
        .heart:nth-child(7){ left:55%; animation-delay:4s;}
        .heart:nth-child(8){ left:75%; animation-delay:1s;}
        .button{
            margin-top:40px;
        }
        @keyframes walkAcross{
            0%{
                left:-10%;
                transform:rotate(-10deg);
                opacity:0;
            }
            15%{
                opacity:1;
            }
            100%{
                left:100%;
                transform:rotate(10deg);
                opacity:0;
            }
        }
        @keyframes floatHeart{
            from{
                transform:translateY(0);
                opacity:0;
            }
            20%{
                opacity:1;
            }
            to{
                transform:translateY(-120vh);
                opacity:0;
            }
        }
        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }
    </style>
</head>
<body>
<div class="journey">
<h1>👣 Tiny Footsteps...</h1>
<p>
Every tiny footprint<br>
brings more love...<br><br>
Every heartbeat<br>
brings more happiness...<br><br>
And soon...<br>
our greatest adventure begins.
</p>
<div class="walk">
<div class="foot">👣</div>
<div class="foot">👣</div>
<div class="foot">👣</div>
<div class="foot">👣</div>
</div>
<div class="heart">❤️</div>
<div class="heart">💖</div>
<div class="heart">💕</div>
<div class="heart">💗</div>
<a href="reveal.html" class="button">
Reveal Our Secret ✨
</a>
</div>
</body>
</html>
